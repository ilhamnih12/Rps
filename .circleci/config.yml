version: 2.1
orbs:
  win: circleci/windows@5.0

jobs:
  playit-setup:
    executor:
      name: win/server-2022
    steps:
      - checkout

      - run:
          name: Download and Install OpenSSH
          shell: powershell.exe
          command: |
            Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0

      - run:
          name: Enable Terminal Services
          shell: powershell.exe
          command: |
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0

      - run:
          name: Enable Remote Desktop Firewall
          shell: powershell.exe
          command: |
            Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - run:
          name: Set User Authentication
          shell: powershell.exe
          command: |
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - run:
          name: Set Local User Password
          shell: powershell.exe
          command: |
            Set-LocalUser -Name "circleci" -Password (ConvertTo-SecureString -AsPlainText "p@ssw0rd!" -Force)

      - run:
          name: Start SSH Tunnel with Pinggy
          shell: powershell.exe
          command: |
            ssh -p 443 -R0:localhost:3389 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 bswsLcGsP0H+tcp@free.pinggy.io

      - run:
          name: Keep the Job Alive (MUST BE SHORTENED OR REMOVED FOR FREE TIER)
          shell: powershell.exe
          command: |
            Start-Sleep -Seconds 300

workflows:
  version: 2
  playit-workflow:
    jobs:
      - playit-setup
