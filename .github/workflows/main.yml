name: LocalToNet RDP Final

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rdp-setup:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          # Mengaktifkan RDP dan Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set User Password
        shell: powershell
        run: |
          # Set password untuk user runneradmin
          $password = ConvertTo-SecureString "p@ssw0rd!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password
          Write-Host "User: $env:USERNAME"
          Write-Host "Password: p@ssw0rd!"

      - name: Download and Run LocalToNet CLI
        shell: powershell
        run: |
          # 1. Download menggunakan link yang Anda berikan
          Write-Host "Downloading LocalToNet CLI..."
          $url = "https://localtonet.com/download/localtonet-win-64.zip"
          Invoke-WebRequest -Uri $url -OutFile "ltn.zip"
          
          # 2. Extract file ke folder LTN
          Write-Host "Extracting..."
          Expand-Archive -Path "ltn.zip" -DestinationPath "LTN"
          
          # 3. Cari file .exe (untuk memastikan lokasi file tepat)
          $ltnExe = Get-ChildItem -Path ".\LTN" -Filter "localtonet.exe" -Recurse | Select-Object -First 1
          
          if ($ltnExe) {
              Write-Host "Menjalankan LocalToNet..."
              $token = "L7tMYNolxPhkPk0mmpK5KwVP5Gei_OT-7NlP4HsfD7atW1Xce-8ukwVjwwKicDvRYQTBI47K_jbzAnp9JTpeRw"
              
              # Menjalankan dengan perintah authtoken agar semua tunnel di dashboard aktif
              Start-Process $ltnExe.FullName -ArgumentList "authtoken $token" -NoNewWindow
              
              Write-Host "-------------------------------------------------------"
              Write-Host "BERHASIL!"
              Write-Host "Sekarang buka: https://localto.net/tunnel/tcpudp"
              Write-Host "Cari kolom 'Url' untuk melihat alamat RDP Anda."
              Write-Host "-------------------------------------------------------"
          } else {
              Write-Error "File localtonet.exe tidak ditemukan di dalam ZIP!"
              exit 1
          }

      - name: Keep Alive (6 Hours)
        shell: powershell
        run: |
          Write-Host "RDP Aktif. Workflow ini akan berjalan selama 6 jam."
          for ($i = 0; $i -lt 360; $i++) {
              $current = Get-Date -Format "HH:mm:ss"
              Write-Host "Status: Online [$current] - Cek Dashboard LocalToNet untuk port terbaru"
              Start-Sleep -Seconds 60
          }
