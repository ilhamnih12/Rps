name: LocalToNet RDP Fixed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rdp-setup:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set User Password
        shell: powershell
        run: |
          $password = ConvertTo-SecureString "p@ssw0rd!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password

      - name: Start LocalToNet SSH Tunnel
        shell: powershell
        run: |
          # Perbaikan: Menggunakan port 4272 sesuai foto dashboard
          # Format: -R [RemotePort]:[LocalIP]:[LocalPort]
          Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -N -p 223 -l L7tMYNolxPhkPk0mmpK5KwVP5Gei_OT-7NlP4HsfD7atW1Xce-8ukwVjwwKicDvRYQTBI47K_jbzAnp9JTpeRw 42jdsvf1bb.localto.net -R 6687:127.0.0.1:3389" -NoNewWindow
          
          Write-Host "-------------------------------------------------------"
          Write-Host "TUNNEL BERHASIL AKTIF!"
          Write-Host "Alamat RDP: 42jdsvf1bb.localto.net:6687"
          Write-Host "Username  : runneradmin"
          Write-Host "Password  : p@ssw0rd!"
          Write-Host "-------------------------------------------------------"

      - name: Keep Alive (6 Hours)
        shell: powershell
        run: |
          Write-Host "RDP Aktif. Jangan tutup tab GitHub Actions ini."
          $i = 0
          while($i -lt 360) {
            Write-Host "Keep Alive - Pulse $(Get-Date)"
            Start-Sleep -Seconds 60
            $i++
          }
