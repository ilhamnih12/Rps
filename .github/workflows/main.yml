name: LocalToNet RDP (Official CLI Method)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rdp-setup:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set User Password
        shell: powershell
        run: |
          $password = ConvertTo-SecureString "p@ssw0rd!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password

      - name: Install & Start LocalToNet CLI
        shell: powershell
        run: |
          # 1. Download LocalToNet CLI
          Invoke-WebRequest -Uri "https://localto.net/download/localtonet-windows-x64.zip" -OutFile "localtonet.zip"
          Expand-Archive -Path "localtonet.zip" -DestinationPath "."
          
          # 2. Jalankan dengan AuthToken Anda
          # Token diambil dari username SSH yang Anda berikan tadi
          $authToken = "L7tMYNolxPhkPk0mmpK5KwVP5Gei_OT-7NlP4HsfD7atW1Xce-8ukwVjwwKicDvRYQTBI47K_jbzAnp9JTpeRw"
          
          Write-Host "Starting LocalToNet..."
          Start-Process ".\localtonet.exe" -ArgumentList "authtoken $authToken" -NoNewWindow
          
          Write-Host "-------------------------------------------------------"
          Write-Host "LOKASI CEK PORT:"
          Write-Host "Buka: https://localto.net/tunnel/tcpudp"
          Write-Host "Gunakan alamat & port yang muncul di kolom 'Url'"
          Write-Host "-------------------------------------------------------"

      - name: Keep Alive (6 Hours)
        shell: powershell
        run: |
          $i = 0
          while($i -lt 360) {
            $at = Get-Date -Format "HH:mm:ss"
            Write-Host "RDP Active - Pulse at $at - Cek Dashboard untuk Port Terbaru"
            Start-Sleep -Seconds 60
            $i++
          }
